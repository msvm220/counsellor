version: '3.8'

services:
  backend:
    build:
      context: ./pathfindr-backend
      dockerfile: Dockerfile
    container_name: pathfindr-backend
    restart: unless-stopped
    env_file:
      - ./pathfindr-backend/.env
    environment:
      - NODE_ENV=production
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pathfindr-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./pathfindr-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SOCKET_URL=
    container_name: pathfindr-frontend
    restart: unless-stopped
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pathfindr-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pathfindr-network:
    driver: bridge
