# Render Blueprint — tells Render how to deploy the backend
# Docs: https://docs.render.com/blueprint-spec
services:
  - type: web
    name: counsellor
    runtime: docker
    dockerfilePath: ./pathfindr-backend/Dockerfile
    dockerContext: ./pathfindr-backend
    region: singapore
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CLIENT_URL
        sync: false  # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
